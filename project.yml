name: ZenCoin
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15"
targets:
  ZenCoin:
    type: application
    platform: iOS
    sources:
      - path: ZenCoin
    info:
      path: ZenCoin/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: ZenCoin
        CFBundleURLTypes:
          - CFBundleURLName: com.personal.ZenCoin
            CFBundleURLSchemes:
              - zencoin
    settings:
      SWIFT_VERSION: "5.9"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      DEVELOPMENT_TEAM: ""
      PRODUCT_NAME: ZenCoin
      DEFINES_MODULE: YES
      ENABLE_TESTABILITY: YES
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  ZenCoin:
    build:
      parallelizeBuild: false
      buildImplicitDependencies: true
      targets:
        ZenCoin: all
