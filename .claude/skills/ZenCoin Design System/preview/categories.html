  .cell.sel .ico { background: var(--accent); color: var(--bg-primary); }
  .ico svg { width: 17px; height: 17px; }
  .lab { font-size: 10.5px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.02em; }
  .cell.sel .lab { color: var(--text-primary); }
</style>
