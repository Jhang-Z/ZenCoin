<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · Bottom Bar</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-primary); }
  .stage { padding: 24px; }
  .bar {
    position: relative;
    height: 84px;
    background: var(--bg-surface);
    border-top: 1px solid var(--separator);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding: 12px 24px 0;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-secondary); }
  .tab.active { color: var(--text-primary); }
  .tab svg { width: 18px; height: 18px; }
  .lab { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .underline { width: 16px; height: 1px; background: transparent; }
  .tab.active .underline { background: var(--accent); }
  .fab {
    position: absolute; left: 50%; top: -22px; transform: translateX(-50%);
    width: 56px; height: 56px; border-radius: 999px;
    background: var(--accent); color: var(--bg-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .fab svg { width: 22px; height: 22px; stroke-width: 2.4; }
</style>
</head><body data-theme="claude">
  <div class="bar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <div class="lab">Ledger</div>
      <div class="underline"></div>
    </div>
    <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <div class="lab">Insight</div>
      <div class="underline"></div>
    </div>
  </div>
</body></html>
