<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · Type Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--separator); }
  .row:last-child { border-bottom: 0; }
  .label { width: 88px; flex: none; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .meta  { width: 110px; flex: none; font-size: 11px; color: var(--text-secondary); font-feature-settings: "tnum"; }
  .specimen { color: var(--text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head><body data-theme="claude">
  <div class="row"><div class="label">Display</div><div class="meta">44 / 500</div><div class="specimen zc-display">¥ 1,284.50</div></div>
  <div class="row"><div class="label">Title</div><div class="meta">22 / 500</div><div class="specimen zc-title">2026 年 4 月</div></div>
  <div class="row"><div class="label">Heading</div><div class="meta">17 / 500</div><div class="specimen zc-heading">Anthropic Serif feels editorial</div></div>
  <div class="row"><div class="label">Body</div><div class="meta">15 / 400</div><div class="specimen zc-body">点底部浮动「+」 → 选支出 / 收入 → 输入金额</div></div>
  <div class="row"><div class="label">Caption</div><div class="meta">13 / 400</div><div class="specimen zc-caption">餐饮 · 14:32</div></div>
  <div class="row"><div class="label">Micro</div><div class="meta">11 / 500 · 0.06em</div><div class="specimen zc-micro">IN · OUT · BAL · LEDGER · INSIGHT</div></div>
</body></html>
