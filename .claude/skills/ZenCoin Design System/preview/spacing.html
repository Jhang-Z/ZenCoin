<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · Spacing Grid</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: 12px; padding: 8px 0; }
  .k { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .desc { font-size: 12px; color: var(--text-primary); }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
  .b8  { width: 8px; }  .b12 { width: 12px; } .b14 { width: 14px; }
  .b16 { width: 16px; } .b24 { width: 24px; } .b32 { width: 32px; } .b120 { width: 120px; }
  .meta { font-size: 11px; color: var(--text-secondary); font-feature-settings: "tnum"; text-align: right; }
</style>
</head><body data-theme="claude">
  <div class="row"><div class="k">Tight</div><div><div class="bar b8"></div></div><div class="meta">8pt</div></div>
  <div class="row"><div class="k">Inline</div><div><div class="bar b12"></div></div><div class="meta">12pt</div></div>
  <div class="row"><div class="k">Inline +</div><div><div class="bar b14"></div></div><div class="meta">14pt</div></div>
  <div class="row"><div class="k">Card</div><div><div class="bar b16"></div></div><div class="meta">16pt</div></div>
  <div class="row"><div class="k">Edge</div><div><div class="bar b24"></div></div><div class="meta">24pt</div></div>
  <div class="row"><div class="k">Section</div><div><div class="bar b32"></div></div><div class="meta">32pt</div></div>
  <div class="row"><div class="k">Tab safe</div><div><div class="bar b120"></div></div><div class="meta">120pt</div></div>
</body></html>
