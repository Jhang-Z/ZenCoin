<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .label { width: 110px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
</style>
</head><body data-theme="claude">
  <div class="row"><div class="label">Primary</div><button class="zc-btn-primary">保存</button><button class="zc-btn-primary">完成</button></div>
  <div class="row"><div class="label">Secondary</div><button class="zc-btn-secondary">支出</button><button class="zc-btn-secondary">收入</button></div>
  <div class="row"><div class="label">Tertiary</div><button class="zc-btn-tertiary">取消</button></div>
  <div class="row"><div class="label">Destructive</div><button class="zc-btn-destructive">删除</button><button class="zc-btn-destructive">清空所有记录</button></div>
</body></html>
