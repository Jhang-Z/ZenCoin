<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · Bilingual Rules</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body { padding: 22px; }
  .pair { display: grid; grid-template-columns: 92px 1fr; gap: 14px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--separator); }
  .pair:last-child { border-bottom: 0; }
  .k { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .v { font-size: 14px; color: var(--text-primary); }
  .v .acc { color: var(--accent); }
  .v code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; padding: 1px 6px; background: var(--bg-input); border-radius: 4px; }
</style>
</head><body data-theme="claude">
  <div class="pair"><div class="k">English caps</div><div class="v"><code>IN</code> <code>OUT</code> <code>BAL</code> <code>LEDGER</code> <code>INSIGHT</code> · tracking ≥ 0.6</div></div>
  <div class="pair"><div class="k">Bilingual</div><div class="v"><code>APPEARANCE / 外观</code> · <code>EXPENSE / 支出</code></div></div>
  <div class="pair"><div class="k">Chinese</div><div class="v">屏幕标题 · 按钮 · 分类 · 备注 · 对话框</div></div>
  <div class="pair"><div class="k">Brand</div><div class="v"><span class="acc">ZenCoin</span> · always English</div></div>
  <div class="pair"><div class="k">No emoji</div><div class="v">No emoji. No 🌈. No 🚀. No 💸.</div></div>
</body></html>
