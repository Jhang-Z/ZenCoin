<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>ZenCoin · iOS UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #ECEAE3; font-family: var(--font-design); }
  .stage { display: flex; gap: 32px; padding: 40px 24px; justify-content: center; align-items: flex-start; min-height: 100vh; flex-wrap: wrap; }
  .label { text-align: center; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #5E5D59; margin-top: 14px; font-weight: 500; }
  .phone { width: 393px; }
  .screen { width: 393px; height: 852px; background: var(--bg-primary); border-radius: 48px; overflow: hidden; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.04), 0 8px 24px rgba(20,20,19,0.10); border: 8px solid #1a1a1a; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 999px; z-index: 10; }
  .statusbar { padding: 18px 28px 4px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .body-stack { height: calc(100% - 36px); display: flex; flex-direction: column; }
  .scroll { flex: 1; overflow: hidden; }
  hr.zc-separator { border: 0; height: 1px; background: var(--separator); margin: 0; }
  .day-header { padding: 24px 24px 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="LedgerHeader.jsx"></script>
<script type="text/babel" src="EntryRow.jsx"></script>
<script type="text/babel" src="BottomBar.jsx"></script>
<script type="text/babel" src="EntrySheet.jsx"></script>
<script type="text/babel" src="InsightView.jsx"></script>
</head>
<body data-theme="claude">

<div class="stage" id="root"></div>

<script type="text/babel">
const SAMPLE_ENTRIES_TODAY = [
  { id: 1, day: "4 月 25 日 · 周六", category: "dining",   title: "公司食堂",   subtitle: "餐饮 · 12:14", amount: "−¥28.00",  isIncome: false },
  { id: 2, day: "4 月 25 日 · 周六", category: "transport", title: "出租车",     subtitle: "交通 · 22:30", amount: "−¥48.00",  isIncome: false },
  { id: 3, day: "4 月 25 日 · 周六", category: "shopping",  title: "买书",       subtitle: "购物 · 15:02", amount: "−¥86.00",  isIncome: false },
];
const SAMPLE_ENTRIES_YDAY = [
  { id: 4, day: "4 月 24 日 · 周五", category: "salary",   title: "四月工资",   subtitle: "工资 · 09:00", amount: "+¥12,800.00", isIncome: true },
  { id: 5, day: "4 月 24 日 · 周五", category: "daily",    title: "便利店",     subtitle: "日用 · 19:42", amount: "−¥36.50",  isIncome: false },
  { id: 6, day: "4 月 24 日 · 周五", category: "travel",   title: "高铁票",     subtitle: "旅行 · 11:20", amount: "−¥553.00", isIncome: false },
];
const ALL = [...SAMPLE_ENTRIES_TODAY, ...SAMPLE_ENTRIES_YDAY];

function Phone({ children, time = "9:41" }) {
  return (
    <div className="phone">
      <div className="screen">
        <div className="notch"></div>
        <div className="statusbar">
          <span>{time}</span>
          <span style={{display:"inline-flex",gap:5,alignItems:"center"}}>
            <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><rect x="0" y="3" width="3" height="5" rx="1"/><rect x="5" y="2" width="3" height="6" rx="1"/><rect x="10" y="1" width="3" height="7" rx="1"/><rect x="15" y="0" width="3" height="8" rx="1"/></svg>
            <svg width="22" height="11" viewBox="0 0 22 11" fill="none" stroke="currentColor" strokeWidth="1"><rect x="0.5" y="0.5" width="18" height="10" rx="2"/><rect x="2" y="2" width="13" height="7" fill="currentColor"/><rect x="20" y="3" width="1.5" height="5" fill="currentColor"/></svg>
          </span>
        </div>
        <div className="body-stack">{children}</div>
      </div>
    </div>
  );
}
function LedgerScreen({ onAdd, onTab, active }) {
  return (
    <>
      <LedgerHeader bookName="主账本" />
      <div className="scroll" style={{ overflowY: "auto" }}>
        {[SAMPLE_ENTRIES_TODAY, SAMPLE_ENTRIES_YDAY].map((group, gi) => (
          <React.Fragment key={gi}>
            <div className="day-header zc-micro" style={{textTransform: "none", letterSpacing: "0.04em"}}>{group[0].day}</div>
            {group.map((e, i) => (
              <React.Fragment key={e.id}>
                <EntryRow {...e} />
                {i < group.length - 1 && <hr className="zc-separator" style={{margin:"0 24px"}}/>}
              </React.Fragment>
            ))}
          </React.Fragment>
        ))}
        <div style={{ height: 24 }}/>
      </div>
      <BottomBar active={active} onTab={onTab} onAdd={onAdd} />
    </>
  );
}
function InsightScreen({ onTab, active }) {
  return (
    <>
      <div className="scroll" style={{ overflowY: "auto" }}>
        <InsightView />
      </div>
      <BottomBar active={active} onTab={onTab} />
    </>
  );
}
function App() {
  const [tab, setTab] = React.useState("ledger");
  const [showEntry, setShowEntry] = React.useState(false);
  return (
    <>
      <div>
        <Phone>
          {tab === "ledger" ? <LedgerScreen active="ledger" onTab={setTab} onAdd={() => setShowEntry(true)} /> : <InsightScreen active="insight" onTab={setTab} />}
        </Phone>
        <div className="label">{tab === "ledger" ? "Ledger / 账本" : "Insight / 洞察"}</div>
      </div>
      <div>
        <Phone time="9:42">
          <div style={{ background: "var(--bg-primary)", height: "100%" }}>
            <div style={{ height: "15%", background: "rgba(0,0,0,0.18)" }}></div>
            <div style={{ height: "85%", borderRadius: "20px 20px 0 0", overflow: "hidden", background: "var(--bg-primary)" }}>
              <EntrySheet onDismiss={() => {}} onSave={() => {}} />
            </div>
          </div>
        </Phone>
        <div className="label">Entry sheet / 录入</div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
